{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'articles/css/article.css' %}">
</head>
<body class="article">
    <div class="header">
        <img src="{% static 'articles/img/dpb-logo.png' %}" />
    </div>

    <div class="article">
        <h1>{{ post.title }}</h1>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
        <p><a href="/">Все записи</a></p>
    </div>
</body>
</html>
