{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'articles/css/article.css' %}">
</head>
<body class="archive">
    <div class="header">
        <img class="logo" src="{% static 'articles/img/dpb-logo.png' %}" alt="">
        <div class="header-text-area">
            <p class="service-title">Коллективный блог</p>
            <a href="/register/" class="register-link">Регистрация</a>
            <a href="/login/" class="login-link">Вход</a>
        </div>
        <div class="icons-for-parallax">
            <img class="icon-for-parallax-first" src="{% static 'articles/img/article-icon-for-parallax.png' %}" alt="">
            <img class="icon-for-parallax-second" src="{% static 'articles/img/article-icon-for-parallax.png' %}" alt="">
            <img class="icon-for-parallax-third" src="{% static 'articles/img/article-icon-for-parallax.png' %}" alt="">
        </div>
    </div>

    <div class="archive-posts">
        {% for post in posts %}
        <div class="one-post">
            <div class="post-head">
                <h2 class="post-title"><a href="/article/{{ post.id }}/">{{ post.title }}</a></h2>
                <button class="fold-button">Свернуть</button>
            </div>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
            <div class="one-post-shadow"></div>
        </div>
        {% endfor %}
    </div>

    <script src="{% static 'articles/js/jquery.js' %}"></script>
    <script src="{% static 'articles/js/helloworld.js' %}"></script>
    <script src="{% static 'articles/js/fold-post.js' %}"></script>
    <script src="{% static 'articles/js/highlight-post.js' %}"></script>
    <script src="{% static 'articles/js/parallax.js' %}"></script>
</body>
</html>
